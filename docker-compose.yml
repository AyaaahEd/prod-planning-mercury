version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mercury-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mercury_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6.0
    container_name: mercury-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: mercury-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: mercury-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  backend:
    build:
      context: ./production-service
      dockerfile: Dockerfile
    container_name: mercury-backend
    ports:
      - "8080:8080"
    environment:
      # Surcharge de localhost par les noms des conteneurs Docker internes
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mercury_production
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mercury_production_views
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - mongodb
      - kafka

  frontend:
    build:
      context: ./frontend/production-dashboard
      dockerfile: Dockerfile
    container_name: mercury-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
