server:
  port: 8080

spring:
  application:
    name: production-service

  # PostgreSQL - Event Store Writes
  datasource:
    url: jdbc:postgresql://localhost:5432/mercury_production
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # MongoDB - Read Model Projections
  data:
    mongodb:
      uri: mongodb://localhost:27017/mercury_production_views

  # Kafka configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: production-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Custom Metaboard configurations
metaboard:
  ftp:
    inbound-path: ../metaboard-ftp/inbound
    processed-path: ../metaboard-ftp/processed
  # Mock API targets (for simulating INTEX, Configuration Service, etc.)
  intex-api-url: http://localhost:8080/mock/intex
  config-service-url: http://localhost:8080/mock/config
